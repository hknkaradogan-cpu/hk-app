html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--ff);

button{cursor:pointer;border:none;font-family:var(--ff);background:none;-webkit-tap-highlight-color:transparent}
#app{display:flex;flex-direction:column;height:100dvh;height:100vh;background:var(--bg)}
#bar{flex-shrink:0;background:var(--b1);border-bottom:1px solid var(--br);

.b-logo{width:32px;height:32px;border-radius:9px;flex-shrink:0;

.nbdg.on{display:grid}

.rn{width:48px;height:48px;border-radius:12px;flex-shrink:0;

.tacts{display:grid;border-top:1px solid var(--br)}
.act{display:flex;flex-direction:column;align-items:center;justify-content:center;

.sh-h{width:34px;height:4px;background:var(--br2);border-radius:2px;margin:10px auto 16px}
.sh-t{font-size:16px;font-weight:800;color:var(--w);margin-bottom:15px}
#nf-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:80;display:none;backdrop-filter:blur(2px)}

.empty-i{font-size:44px;margin-bottom:10px}

</style>

function matchName(name){

  let m=A.pers.find(p=>normStr(p.name)===nn); if(m)return m;

  for(const pt of pts){
    m=A.pers.find(p=>normStr(p.name).split(' ').some(pn=>pn.startsWith(pt)||pt.startsWith(pn)));
    if(m)return m;
  }
  const lastName=pts[pts.length-1];
  if(lastName&&lastName.length>2){m=A.pers.find(p=>normStr(p.name).includes(lastName));if(m)return m;}
  return null;
}

function parseApiError(status,body){
  const raw=(body?.error?.message||'').toLowerCase();
  if(status===429||raw.includes('quota')) return 'API kotasi doldu. 30 saniye bekleyip tekrar deneyin.';
  if(status===403||raw.includes('key')||raw.includes('permission')) return 'API anahtari gecersiz veya kisitli.';
  if(status===404) return 'Model bulunamadi.';
  if(status>=500) return 'Gemini sunucusu gecici olarak kullanilamiyor. Tekrar deneyin.';
  return 'API Hatasi ('+status+'): '+(body?.error?.message||'Bilinmeyen hata');
}

async function aiCall(prompt,maxTok=800){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),45000);
  try{
    const resp=await fetch(PROXY_URL,{
      method:'POST',signal:ctrl.signal,
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt,maxTokens:maxTok,sys:SYS})
    });
    clearTimeout(tid);
    if(!resp.ok){let e={};try{e=await resp.json();}catch(_){}throw new Error(parseApiError(resp.status,e));}
    const data=await resp.json();
    return data?.text||'';
  }catch(err){
    clearTimeout(tid);
    if(err.name==='AbortError')throw new Error('Zaman asimi (45sn). Internet baglantinizi kontrol edin.');
    throw err;
  }
}

let pdfLib=null;
async function loadPDFLib(){
  if(pdfLib)return pdfLib;
  await new Promise((resolve,reject)=>{
    if(window.pdfjsLib){pdfLib=window.pdfjsLib;resolve();return;}
    const script=document.createElement('script');
    script.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    script.onload=()=>{
      pdfLib=window.pdfjsLib;
      try{pdfLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}catch(e){}
      resolve();
    };
    script.onerror=()=>reject(new Error('pdf.js CDN yuklenemedi. Internet baglantisini kontrol edin.'));
    document.head.appendChild(script);
  });
  return pdfLib;
}

async function pdfToImages(file,scale=2.0){
  const lib=await loadPDFLib();
  const arrayBuffer=await file.arrayBuffer();
  let pdf;
  try{pdf=await lib.getDocument({data:arrayBuffer}).promise;}
  catch(e1){
    try{
      lib.GlobalWorkerOptions.workerSrc='';
      pdf=await lib.getDocument({data:arrayBuffer,disableRange:true}).promise;
    }catch(e2){throw new Error('PDF acilamadi: '+e2.message);}
  }
  const images=[];
  for(let pageNum=1;pageNum<=pdf.numPages;pageNum++){
    const page=await pdf.getPage(pageNum);
    const viewport=page.getViewport({scale});
    const canvas=document.createElement('canvas');
    canvas.width=Math.round(viewport.width);
    canvas.height=Math.round(viewport.height);
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    await page.render({canvasContext:ctx,viewport}).promise;
    images.push(canvas.toDataURL('image/jpeg',0.88).split(',')[1]);
  }
  return images;
}

async function pdfGetText(file){
  const lib=await loadPDFLib();
  const arrayBuffer=await file.arrayBuffer();
  let pdf;
  try{pdf=await lib.getDocument({data:arrayBuffer}).promise;}catch(e){return '';}
  let text='';
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    let lastY=null;
    for(const item of content.items){
      const y=Math.round(item.transform[5]);
      if(lastY!==null&&Math.abs(y-lastY)>5)text+='\n';
      text+=item.str+' ';
      lastY=y;
    }
    text+='\n';
  }
  return text.trim();
}

function parseJSON(txt){
  const clean=(txt||'').trim().replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
  try{return JSON.parse(clean);}catch{}
  const s=clean.indexOf('{'), e=clean.lastIndexOf('}');
  if(s>=0&&e>s){try{return JSON.parse(clean.slice(s,e+1));}catch{}}
  throw new Error('Gecerli JSON bulunamadi. Lutfen tekrar deneyin.');
}

async function handleFile(file){
  if(!file)return;
  const isImg=file.type.startsWith('image/');
  const isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
  if(!isImg&&!isPDF){toast('PDF, JPG veya PNG secin','err');return;}
  if(A.page!=='pdf'){go('pdf');await sl(150);}
  const el=id=>document.getElementById(id);
  const sEl=el('steps');
  if(el('uic'))el('uic').textContent='';
  if(el('utx'))el('utx').textContent=file.name;
  if(el('usx'))el('usx').textContent=(file.size/1024).toFixed(0)+' KB — Isleniyor...';
  if(sEl)sEl.style.display='block';
  const STEPS=[
    {t:'PDF isleniyor...',i:''},
    {t:'Gemini Vision analiz ediyor...',i:''},
    {t:'Oda-isim eslesmeleri bulunuyor...',i:''},
    {t:'Gorevler personele ataniyor...',i:''},
  ];
  let sec=0;
  const tmr=setInterval(()=>{sec++;const te=el('ptimer');if(te)te.textContent=sec+'sn';},1000);
  const draw=(active,extra='')=>{
    if(!sEl)return;
    sEl.innerHTML=STEPS.map((s,i)=>`
      <div class="step ${i<active?'done':i===active?'act':''}">
        <span style="font-size:16px;width:20px;flex-shrink:0">${s.i}</span>
        <span style="flex:1;color:${i<active?'var(--grn)':i===active?'var(--amb)':'var(--d)'}">
          ${s.t}${i===active?`<span id="ptimer" style="font-family:var(--fm);font-size:10px;margin-left:5px">${sec}sn</span>`:''}
        </span>
        ${i<active?'<span style="color:var(--grn)">OK</span>':i===active?'<div class="sp"></div>':''}
      </div>`).join('')+extra;
  };
  try{
    draw(0);
    let images=[];
    if(isImg){
      const b64=await new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onload=()=>resolve(reader.result.split(',')[1]);
        reader.onerror=()=>reject(new Error('Goruntu okunamadi'));
        reader.readAsDataURL(file);
      });
      images=[b64];
    }else{
      let text='';
      try{text=await pdfGetText(file);}catch(e){}
      if(text&&text.trim().length>50){
        draw(1);
        const resultText=await aiCall(makePDFPrompt()+'\n\nPDF METNI:\n'+text.slice(0,15000),8000);
        if(!resultText||resultText.trim().length<10)throw new Error('AI bos yanit dondurdu. Tekrar deneyin.');
        draw(2);await sl(100);
        const result=parseJSON(resultText);
        draw(3);
        distTasks(result);
        clearInterval(tmr);
        A.pdfRes=result;dbSave();
        toast(sec+'sn de tamamlandi (metin modu)!','ok');
        renderPDFResult();return;
      }
      images=await pdfToImages(file,2.0);
      if(!images.length)throw new Error('PDF den sayfa alinamadi.');
    }
    draw(1);
    const resultText=await aiVision(images,makePDFPrompt());
    if(!resultText||resultText.trim().length<10)throw new Error('AI bos yanit dondurdu. Tekrar deneyin.');
    draw(2);await sl(100);
    const result=parseJSON(resultText);
    draw(3);
    distTasks(result);
    clearInterval(tmr);await sl(200);
    A.pdfRes=result;dbSave();
    toast(sec+'sn de tamamlandi!','ok');
    renderPDFResult();
  }catch(err){
    clearInterval(tmr);
    let msg=err.message||'Bilinmeyen hata';
    if(msg.includes('fetch')||msg.includes('Failed to fetch')||msg.includes('NetworkError'))
      msg='Internet baglantisi hatasi. WiFi/4G baglantinizi kontrol edin.';
    if(msg.includes('AbortError')||msg.includes('abort'))
      msg='Zaman asimi. Baglantiniz cok yavas olabilir.';
    if(msg.includes('quota')||msg.includes('429'))
      msg='Gemini API kotasi doldu. Birka dakika bekleyip tekrar deneyin.';
    if(sEl)draw(0,`
      <div style="background:rgba(224,40,40,.08);border:1px solid rgba(224,40,40,.25);border-radius:12px;padding:14px;margin-top:10px">

          <button class="btn b-ghost" onclick="go('dash')">Panel</button>
        </div>
      </div>`);
    if(el('uic'))el('uic').textContent='';
    if(el('utx'))el('utx').textContent='Hata — Tekrar deneyin';
  }
}

function setRoomSt(tid,pid,st){
  if(st==='ariza'){openAriza(tid,pid);return;}
  const t=(A.tasks[pid]||[]).find(x=>x.id===tid);if(!t)return;
  t.status=st;t.st=now();
  const rm=A.rooms.find(x=>x.id===tid);if(rm){rm.status=st;rm.st=now();}
  const wk=A.pers.find(p=>p.id===pid);if(!wk)return;
  const lbl={done:'Temizlendi',dnd:'DND',red_service:'Red Servis'}[st]||st;
  push(['sef','admin'],wk.name+' — Oda '+t.roomNo+': '+lbl,'',st==='done'?'g':st==='dnd'?'a':'r');
  dbSave();toast('Oda '+t.roomNo+': '+lbl,'ok');

  if(A.page==='rooms'||A.page==='myrooms')pgRooms();
}
function resetRoomSt(tid,pid){
  const t=(A.tasks[pid]||[]).find(x=>x.id===tid);if(t){t.status='pending';delete t.st;}
  const r=A.rooms.find(x=>x.id===tid);if(r){r.status='pending';delete r.st;}

function confirmOda(tid){
  const rm=A.rooms.find(x=>x.id===tid);if(!rm)return;
  rm.confirmed=true;rm.confirmedBy=A.user?.name;rm.ct=now();
  const t=(A.tasks[rm.pid]||[]).find(x=>x.id===tid);if(t)t.confirmed=true;

async function doAriza(tid,pid){
  const desc=(document.getElementById('ard')?.value||'').trim();
  const pri=document.getElementById('arp')?.value||'medium';
  if(!desc){toast('Aciklama girin','err');return;}
  const t=(A.tasks[pid]||[]).find(x=>x.id===tid);
  const wk=A.pers.find(p=>p.id===pid);
  if(!t||!wk)return;
  t.status='ariza';t.st=now();t.arizaDesc=desc;
  const rm=A.rooms.find(x=>x.id===tid);if(rm)rm.status='ariza';
  closeSheet();
  toast('Bildirildi, AI oneri uretiyor...','ok');
  let ai='';
  try{ai=await aiCall('Otel odasi ariza: "'+desc+'" (Oda '+t.roomNo+'). 2 cumle teknik mudahale onerisi.',200);}
  catch(e){ai='Lutfen manuel kontrol edin.';}
  const priLabel={high:'Acil',medium:'Orta',low:'Dusuk'}[pri];
  A.tickets.push({id:'tk'+Date.now(),roomNo:t.roomNo,desc,priority:pri,status:'open',fromPid:pid,fromName:wk.name,time:now(),ai});
  push('teknik',priLabel+' IS EMRI — Oda '+t.roomNo+': '+desc.slice(0,60),'','c');
  dbSave();buildTabs();
  toast('Teknik Servise iletildi','ok');
  if(A.page==='tasks')pgTasks();
}

function pgTech(){_renderTech(A.tickets);}
function pgMyTech(){_renderTech(A.tickets);}
function _renderTech(tks){
  const PRI={high:{l:'Acil',c:'ph'},medium:{l:'Orta',c:'pm'},low:{l:'Dusuk',c:'pl'}};
  const ST={open:{l:'Acik'},inprogress:{l:'Devam'},done:{l:'Tamam'},delayed:{l:'Ertelendi'}};
  R(`
    <div class="rh"><div><div class="pt">Teknik Servis</div><div class="ps">${tks.length} is emri</div></div></div>
    ${!tks.length
      ?`<div class="empty"><div class="empty-i">🔧</div><div class="empty-t">Is Emri Yok</div></div>`
      :tks.map(tk=>{
          const pri=PRI[tk.priority]||PRI.medium;
          const st=ST[tk.status]||ST.open;
          return `<div class="tkt ${pri.c}">
            <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:7px">
              <div style="flex:1">
                <div style="font-size:14px;font-weight:800;color:var(--h)">Oda ${esc(tk.roomNo)}</div>
                <div style="font-size:12px;margin:3px 0;line-height:1.4">${esc(tk.desc)}</div>
                <div style="font-size:10px;color:var(--d);font-family:var(--fm)">Bildiren: ${esc(tk.fromName)} · ${tk.time}</div>
              </div>
              <div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0">
                <span class="bdg" style="background:rgba(224,40,40,.12);color:var(--red)">${pri.l}</span>
                <span class="bdg" style="background:rgba(64,112,255,.12);color:var(--blue)">${st.l}</span>
              </div>
            </div>
            ${tk.ai?`<div class="aibox"><div style="font-size:9px;font-weight:700;color:var(--blue);margin-bottom:3px;font-family:var(--fm)">AI ONERI</div>${esc(tk.ai)}</div>`:''}
            ${tk.status!=='done'
              ?`<div style="display:flex;gap:6px;margin-top:9px">
                  ${tk.status==='open'?`<button class="btn b-ghost b-sm" data-id="${tk.id}" data-st="inprogress" onclick="updTkt(this.dataset.id,this.dataset.st)">Ustlendim</button>`:''}
                  <button class="btn b-grn b-sm" data-id="${tk.id}" data-st="done" onclick="updTkt(this.dataset.id,this.dataset.st)">Yapildi</button>
                  <button class="btn b-amb b-sm" data-id="${tk.id}" data-st="delayed" onclick="updTkt(this.dataset.id,this.dataset.st)">Ertele</button>
                </div>`:''}
          </div>`;
        }).join('')}
  `);
}
function updTkt(id,st){
  const tk=A.tickets.find(t=>t.id===id);if(!tk)return;
  tk.status=st;
  if(st==='done'){push(['admin'],'Teknik tamamladi — Oda '+tk.roomNo+' onayinizi bekliyor','','g');push(tk.fromPid,'Oda '+tk.roomNo+' arizasi giderildi','','g');}
  else if(st==='delayed'){push(tk.fromPid,'Oda '+tk.roomNo+' arizasi ertelendi','','a');}
  dbSave();buildTabs();
  toast(st==='done'?'Tamamlandi':'Ertelelendi','ok');
  if(A.page==='tech')pgTech();if(A.page==='mytech')pgMyTech();
}

function pgReq(){_renderReq(true);}
function pgReqP(){_renderReq(false);}
function _renderReq(isSef){
  const DEPTL=['HK','Teknik Servis','F&B','Genel'];
  const STC={open:{l:'Acik',c:'var(--red)'},inprogress:{l:'Islemde',c:'var(--blue)'},done:{l:'Tamam',c:'var(--grn)'}};
  R(`
    <div class="rh">
      <div><div class="pt">${isSef?'Gelen Is Emirleri':'Misafir Istek Paneli'}</div></div>
      ${!isSef?`<button class="btn b-blue b-sm" id="add-req-btn">+ Is Emri</button>`:''}
    </div>
    ${!A.reqs.length
      ?`<div class="empty"><div class="empty-i"></div><div class="empty-t">${isSef?'Is Emri Yok':'Henuz Talep Olusturulmadi'}</div>
         ${!isSef?`<div style="font-size:13px;color:var(--d);margin-bottom:13px">Misafir taleplerini buradan iletin</div><button class="btn b-blue" id="add-req-btn2">+ Olustur</button>`:''}
       </div>`
      :A.reqs.map(rq=>{
          const stv=STC[rq.status]||STC.open;
          const pl={high:'Acil',medium:'Orta',low:'Normal'}[rq.priority]||'Normal';
          return `<div class="card" style="border-left:4px solid ${stv.c}">
            <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:7px">
              <div style="flex:1">
                <div style="font-size:14px;font-weight:800;color:var(--h)">Oda ${esc(rq.room)} — ${esc(rq.dept)}</div>
                <div style="font-size:12px;margin:3px 0;line-height:1.4">${esc(rq.desc)}</div>
                <div style="font-size:10px;color:var(--d);font-family:var(--fm)">${rq.time} · ${pl} · ${esc(rq.by||'Resepsiyon')}</div>
              </div>
              <span class="bdg" style="background:${stv.c}18;color:${stv.c}">${stv.l}</span>
            </div>
            ${rq.status!=='done'
              ?`<div style="display:flex;gap:6px">
                  ${rq.status==='open'?`<button class="btn b-ghost b-sm" data-id="${rq.id}" onclick="updReq(this.dataset.id,'inprogress')">Isleme Al</button>`:''}
                  <button class="btn b-grn b-sm" data-id="${rq.id}" onclick="updReq(this.dataset.id,'done')">Tamamlandi</button>
                </div>`:''}
          </div>`;
        }).join('')}
  `);
  setTimeout(()=>{
    document.getElementById('add-req-btn')?.addEventListener('click',()=>openReqSheet(DEPTL));
    document.getElementById('add-req-btn2')?.addEventListener('click',()=>openReqSheet(DEPTL));
  },100);
}
function openReqSheet(DEPTL){
  openSheet(`
    <div class="sh-t">Yeni Misafir Talebi</div>
    <div class="fg"><label class="flbl">Oda Numarasi *</label><input class="inp" id="rq-room" placeholder="4101" inputmode="numeric"></div>
    <div class="fg"><label class="flbl">Talep Aciklamasi *</label><textarea class="inp" id="rq-desc" rows="3" placeholder="Havlu degisimi, klima..." style="resize:none;border-radius:11px"></textarea></div>
    <div class="fg"><label class="flbl">Departman</label><select class="inp sel" id="rq-dept">${DEPTL.map(d=>`<option value="${d}">${d}</option>`).join('')}</select></div>
    <div class="fg"><label class="flbl">Oncelik</label><select class="inp sel" id="rq-pri"><option value="high">Acil</option><option value="medium" selected>Orta</option><option value="low">Normal</option></select></div>
    <button class="btn b-blue fw" id="rq-sub" style="margin-bottom:8px">Gonder</button>
    <button class="btn b-ghost fw" id="rq-cl">Iptal</button>
  `);
  setTimeout(()=>{
    document.getElementById('rq-room')?.focus();
    document.getElementById('rq-sub')?.addEventListener('click',doSubmitReq);
    document.getElementById('rq-cl')?.addEventListener('click',closeSheet);
  },200);
}
function doSubmitReq(){
  const room=(document.getElementById('rq-room')?.value||'').trim();
  const desc=(document.getElementById('rq-desc')?.value||'').trim();
  const dept=document.getElementById('rq-dept')?.value||'HK';
  const pri=document.getElementById('rq-pri')?.value||'medium';
  if(!room||!desc){toast('Oda ve aciklama zorunlu','err');return;}
  A.reqs.push({id:'rq'+Date.now(),room,desc,dept,priority:pri,status:'open',time:nowD(),by:A.user?.name||'Resepsiyon'});
  const toRole=dept==='HK'?'sef':dept==='Teknik Servis'?'teknik':'admin';
  push([toRole,'admin'],[{high:'Acil',medium:'Orta',low:'Normal'}[pri]]+' IS EMRI — Oda '+room+': '+desc.slice(0,55),'','k');
  dbSave();closeSheet();buildTabs();
  toast(dept+' departmanina is emri verildi','ok');
  if(A.page==='req')pgReq();if(A.page==='reqp')pgReqP();
}
function updReq(id,st){
  const rq=A.reqs.find(r=>r.id===id);if(!rq)return;
  rq.status=st;
  if(st==='done')push(['resep','admin'],'Oda '+rq.room+' talebi tamamlandi','','g');
  dbSave();buildTabs();
  toast(st==='done'?'Tamamlandi':'Isleme alindi','ok');
  if(A.page==='req')pgReq();if(A.page==='reqp')pgReqP();
}

function openAddP(){
  openSheet(`
    <div class="sh-t">+ Yeni Personel</div>
    <div class="fg"><label class="flbl">Ad Soyad *</label><input class="inp" id="np-n" placeholder="Ahmet Yilmaz"></div>
    <div class="fg"><label class="flbl">Departman *</label><select class="inp sel" id="np-d">${DEPTS.slice(1).map(d=>`<option value="${d}">${d}</option>`).join('')}</select></div>
    <div class="fg"><label class="flbl">Sistem Rolu *</label><select class="inp sel" id="np-r">${Object.entries(ROLES).map(([k,v])=>`<option value="${k}">${v.i} ${v.l}</option>`).join('')}</select></div>
    <div class="fg"><label class="flbl">PIN *</label><input class="inp" id="np-p" type="number" placeholder="4-6 haneli" maxlength="6"></div>
    <button class="btn b-blue fw" id="np-sv" style="margin-bottom:8px">Kaydet</button>

  `);
  setTimeout(()=>{document.getElementById('np-n')?.focus();document.getElementById('np-sv')?.addEventListener('click',saveAddP);document.getElementById('np-cl')?.addEventListener('click',closeSheet);},200);
}
function saveAddP(){
  const name=(document.getElementById('np-n')?.value||'').trim();
  const pin=(document.getElementById('np-p')?.value||'').trim();
  if(!name||!pin){toast('Ad ve PIN zorunlu','err');return;}
  if(A.pers.find(p=>p.pin===pin)){toast('Bu PIN zaten kullanımda','err');return;}
  A.pers.push({id:'p'+Date.now(),name,dept:document.getElementById('np-d')?.value||'Diger',role:document.getElementById('np-r')?.value||'hk',pin});
  dbSave();closeSheet();toast(name+' eklendi','ok');pgPers();
}
function openEditP(id){
  const p=A.pers.find(x=>x.id===id);if(!p)return;
  openSheet(`
    <div class="sh-t">Duzenle — ${esc(p.name)}</div>
    <div class="fg"><label class="flbl">Ad Soyad *</label><input class="inp" id="ep-n" value="${esc(p.name)}"></div>
    <div class="fg"><label class="flbl">Departman</label><select class="inp sel" id="ep-d">${DEPTS.slice(1).map(d=>`<option value="${d}" ${p.dept===d?'selected':''}>${d}</option>`).join('')}</select></div>
    <div class="fg"><label class="flbl">Sistem Rolu</label><select class="inp sel" id="ep-r">${Object.entries(ROLES).map(([k,v])=>`<option value="${k}" ${p.role===k?'selected':''}>${v.i} ${v.l}</option>`).join('')}</select></div>
    <div class="fg"><label class="flbl">PIN</label><input class="inp" id="ep-p" type="number" value="${esc(p.pin||'')}" maxlength="6"></div>
    <button class="btn b-blue fw" id="ep-sv" style="margin-bottom:8px">Kaydet</button>
    <button class="btn b-ghost fw" id="ep-cl">Iptal</button>
  `);
  setTimeout(()=>{document.getElementById('ep-n')?.focus();document.getElementById('ep-sv')?.addEventListener('click',()=>saveEditP(id));document.getElementById('ep-cl')?.addEventListener('click',closeSheet);},200);
}
function saveEditP(id){
  const p=A.pers.find(x=>x.id===id);if(!p)return;
  const name=(document.getElementById('ep-n')?.value||'').trim();
  if(!name){toast('Ad zorunlu','err');return;}
  p.name=name;p.dept=document.getElementById('ep-d')?.value||p.dept;p.role=document.getElementById('ep-r')?.value||p.role;
  const pin=(document.getElementById('ep-p')?.value||'').trim();if(pin)p.pin=pin;
  dbSave();closeSheet();toast(name+' guncellendi','ok');pgPers();
}
function delP(id,name){
  if(id===A.user?.id){toast('Kendi hesabinizi silemezsiniz','err');return;}
  A.pers=A.pers.filter(p=>p.id!==id);dbSave();toast(name+' silindi','ok');pgPers();
}

function pgChat(){
  const u=A.user;
  const QQ=['Gunluk ozet ver','Acik arizalar','Bekleyen talepler','Oda durumu'];
  R(`<div class="chat-w">
    <div class="c-msgs" id="cbox">
      <div style="display:flex">
        <div class="bub b">
          <div class="b-nm">HK AI — Gemini</div>
          Merhaba ${esc(u?.name?.split(' ')[0]||'')}! Crowne Plaza Florya Kat Hizmetleri asistaninizim.
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px">
            ${QQ.map(q=>`<button class="chip" data-q="${esc(q)}" onclick="sQ(this.dataset.q)">${q}</button>`).join('')}
          </div>
        </div>
      </div>
      ${A.chatH.map(m=>m.r==='user'
        ?`<div style="display:flex;justify-content:flex-end"><div class="bub u">${esc(m.c)}</div></div>`
        :`<div style="display:flex"><div class="bub b"><div class="b-nm">HK AI</div>${esc(m.c).replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div></div>`
      ).join('')}
    </div>
    <div class="c-bar">
      <input class="inp" id="ci" placeholder="Mesajinizi yazin..." style="border-radius:22px">
      <button class="btn b-blue" id="cs" style="padding:10px 14px;flex-shrink:0">Gonder</button>
    </div>
  </div>`);
  const ci=document.getElementById('ci');
  const cs=document.getElementById('cs');
  if(ci)ci.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sChat();}});
  if(cs)cs.addEventListener('click',sChat);
  sChatScroll();
}
function sQ(q){const ci=document.getElementById('ci');if(ci){ci.value=q;sChat();}}
async function sChat(){
  const ci=document.getElementById('ci');if(!ci)return;
  const msg=ci.value.trim();if(!msg)return;
  ci.value='';
  A.chatH.push({r:'user',c:msg});
  addBub('user',esc(msg));
  const thk=document.createElement('div');thk.id='thk';thk.style.display='flex';
  thk.innerHTML='<div class="bub b"><div class="b-nm">HK AI</div><div class="sp"></div></div>';
  document.getElementById('cbox')?.appendChild(thk);sChatScroll();
  const ctx='Durum: '+A.rooms.length+' oda, '+A.rooms.filter(r=>r.status==='done').length+' temiz, '+A.tickets.filter(t=>t.status==='open').length+' acik ariza, '+A.reqs.filter(r=>r.status==='open').length+' acik talep, '+A.pers.length+' personel.';
  try{
    const rep=await aiCall(ctx+'\n\nSoru: '+msg,500);
    document.getElementById('thk')?.remove();
    A.chatH.push({r:'bot',c:rep});
    addBub('bot',esc(rep).replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>'));
  }catch(e){
    document.getElementById('thk')?.remove();
    addBub('bot','Baglanti hatasi: '+esc(e.message));
  }
  sChatScroll();
}
function addBub(r,html){
  const box=document.getElementById('cbox');if(!box)return;
  const d=document.createElement('div');d.style.display='flex';
  if(r==='user')d.style.justifyContent='flex-end';
  d.innerHTML=r==='user'?`<div class="bub u">${html}</div>`:`<div class="bub b"><div class="b-nm">HK AI</div>${html}</div>`;
  box.appendChild(d);
}
function sChatScroll(){setTimeout(()=>{const c=document.getElementById('cbox');if(c)c.scrollTop=c.scrollHeight;},60);}

dbLoad();
showLogin();
